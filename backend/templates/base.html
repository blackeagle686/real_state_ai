<!DOCTYPE html>
<html lang="en">
<head>
    {% block head %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MarketAI — Smart Shopping{% endblock %}</title>
    <meta name="description" content="{% block description %}Your AI assistant inside the supermarket. Voice & Image search powered by AI.{% endblock %}">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap & Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/style.css">
    {% if use_market_css %}
    <link rel="stylesheet" href="/static/market.css">
    {% endif %}
    
    <script>
        // Apply theme early to prevent flash
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
    
    </style>
    {% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

    <header class="main-header mb-4" id="site-header">
        <div class="header-container">
            <div class="header-left">
                <a href="/" class="brand">
                    <span class="brand-icon">✦</span>
                    <span class="brand-name">MarketAI</span>
                </a>
            </div>
            
            <nav class="header-nav">
                <a href="/?start=chat" class="nav-link" id="nav-chat" title="Chat with AI">
                    <i class="bi bi-chat-dots"></i>
                    <span>Chat</span>
                </a>
                <a href="/catalog" class="nav-link" id="nav-catalog" title="Browse Catalog">
                    <i class="bi bi-grid"></i>
                    <span>Catalog</span>
                </a>
            </nav>
            
            <div class="header-right">
                <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Theme" aria-label="Toggle light / dark mode">
                    <i class="bi bi-sun-fill sun-icon"></i>
                    <i class="bi bi-moon-stars-fill moon-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/main.js"></script>
    
    <script>
        // Set active nav link
        const currentPath = window.location.pathname;
        if (currentPath === '/') {
            document.getElementById('nav-chat').classList.add('active');
        } else if (currentPath.startsWith('/catalog') || currentPath.startsWith('/category') || currentPath.startsWith('/search')) {
            document.getElementById('nav-catalog').classList.add('active');
        }

        // Global Theme Toggle
        const toggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        
        // Sync body class for existing CSS compatibility
        const syncBodyTheme = () => {
            if (htmlElement.classList.contains('light-mode')) {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
        };

        toggleBtn.addEventListener('click', () => {
            const isLight = htmlElement.classList.toggle('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            syncBodyTheme();
        });

        // Initialize body theme
        syncBodyTheme();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
