{% extends "base.html" %}

{% block title %}Admin Login — MarketAI{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card border-0 shadow-lg p-4" style="max-width: 400px; width: 100%; border-radius: 24px; background: var(--surface-solid);">
        <div class="text-center mb-4">
            <div class="display-4 mb-2">🔐</div>
            <h2 class="fw-bold h3">Admin Portal</h2>
            <p class="text-muted">Enter your credentials to manage products</p>
        </div>

        {% if error %}
        <div class="alert alert-danger border-0 rounded-4 mb-4">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/admin/login" method="post">
            <div class="mb-3">
                <label for="username" class="form-label small fw-bold text-muted text-uppercase">Username</label>
                <input type="text" class="form-control rounded-pill px-4 py-2 border-0 shadow-sm" id="username" name="username" required 
                       style="background: var(--search-bg); color: var(--text);">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label small fw-bold text-muted text-uppercase">Password</label>
                <input type="password" class="form-control rounded-pill px-4 py-2 border-0 shadow-sm" id="password" name="password" required
                       style="background: var(--search-bg); color: var(--text);">
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-lg">
                Login to Dashboard
            </button>
        </form>
        
        <div class="mt-4 text-center">
            <a href="/" class="text-muted text-decoration-none small">
                <i class="bi bi-arrow-left"></i> Back to Shop
            </a>
        </div>
    </div>
</div>
{% endblock %}
